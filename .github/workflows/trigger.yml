name: Sync to iOS Fortress
on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Sync Game Code
        run: |
          git config user.name "Fortress Sync"
          git config user.email "actions@github.com"
          
          # 1. Grab everything except the iOS folders from Main
          git checkout origin/main -- src public index.html tsconfig.json vite.config.ts package.json package-lock.json
          
          # 2. Re-inject the Capacitor dependencies (in case AI Studio removed them)
          npm install @capacitor/core @capacitor/cli @capacitor/ios --package-lock-only
          
          # 3. Commit and Push to Master
          git add .
          git commit -m "🚀 Sync latest game code from AI Studio" || echo "No changes to sync"
          git push origin master
