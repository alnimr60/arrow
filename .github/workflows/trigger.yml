name: Sync to iOS Fortress
on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Sync Game Code
        run: |
          git config user.name "Fortress Sync"
          git config user.email "actions@github.com"
          
          # 1. Save the iOS Fortress files in a temporary spot
          mkdir ../fortress_backup
          cp -r ios justfile capacitor.config.ts .github IOS_BUILD_GUIDE.md ../fortress_backup/
          
          # 2. Overwrite everything with the code from AI Studio (Main branch)
          git checkout origin/main -- .
          
          # 3. Restore the iOS Fortress files from our backup
          cp -r ../fortress_backup/* .
          
          # 4. Re-inject Capacitor deps just in case
          npm install @capacitor/core @capacitor/cli @capacitor/ios --package-lock-only || echo "Lockfile update failed, skipping"
          
          # 5. Commit and Push to Master
          git add .
          git commit -m "🚀 Sync latest game code from AI Studio" || echo "No changes to sync"
          git push origin master
