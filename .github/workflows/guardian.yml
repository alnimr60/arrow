name: Guardian - Prevent File Deletion
on:
  push:
    branches: [ main ]

jobs:
  restore-infrastructure:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' # Prevent infinite loops
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get full history

      - name: Check for missing files
        id: check_files
        run: |
          MISSING=false
          if [ ! -f "justfile" ]; then MISSING=true; fi
          if [ ! -d "ios" ]; then MISSING=true; fi
          if [ ! -d ".github/workflows" ]; then MISSING=true; fi
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

      - name: Restore Infrastructure
        if: steps.check_files.outputs.missing == 'true'
        run: |
          echo "🚨 Infrastructure files missing! Restoring..."
          # Find the last commit that actually had the justfile
          LAST_SAFE_COMMIT=$(git log --all --format=%H -1 -- justfile)
          
          # Checkout the missing parts from that commit
          git checkout $LAST_SAFE_COMMIT -- ios justfile capacitor.config.ts .github IOS_BUILD_GUIDE.md package-lock.json
          
          # Also merge Capacitor back into package.json if it's missing
          # (This part is a bit trickier, but we'll start with the files first)
          
          git config user.name "Guardian Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🤖 Guardian: Automatically restored iOS infrastructure files"
          git push origin main
